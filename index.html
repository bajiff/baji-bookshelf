<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Baji Bookshelf</title>
</head>
<body>
  <header>
    <nav id="nav-header">
      <h1 id="h1-header">Baji Bookshelf</h1>
      <ul id="ul-nav">
        <li>
          <a target="_blank" class="" href="https://github.com/bajiff" title="Akun Github Baji">
            <i class="fa-brands social-media fa-2x fa-github"></i>
          </a>
        </li>
        <li>
          <a target="_blank" class="" href="https://www.linkedin.com/in/bagus-aji-fernando-466347286/" title="Akun LinkedIn Baji">
            <i class="fa-brands social-media fa-2x fa-linkedin"></i>
          </a>
        </li>
        <li>
          <a target="_blank" class="" href="https://instagram.com/_bajif" title="Akun Instagram Baji">
            <i class="fa-brands social-media fa-2x fa-instagram"></i>
          </a>
        </li>
      </ul>
      <ul>
        <li>
          <button id="theme-button" class="theme-button" title="Toggle Mode">
            <i id="theme-icon" class="fa-solid fa-moon fa-xl"></i>
          </button>
        </li>
      </ul>
    </nav>
  </header>
  <main>
    <!-- ? Bagian Buat Inputnya Buku -->
    <section id="input-section">

      <h2>Input Your Book</h2>

      <form id="form-input-section" action="">

        <div class="div-input">
        <label class="text-input" for="title">Title<span class="required">*</span></label>
          <input class="input-form" id="title" type="text" name="title" value="" placeholder="Input Book Title..." autofocus required>
        </div>

        <div class="div-input">
        <label class="text-input" for="sub-title">Sub Title</label>
          <input class="input-form" id="sub-title" type="text" name="sub-title" value="" placeholder="Input Sub Title...">
        </div>

        <div class="div-input">
        <label class="text-input" for="author">Author<span class="required">*</span></label>
          <input class="input-form" id="author" type="text" name="author" value="" placeholder="Input Author Name..." required>
        </div>


        <div class="div-input">
        <label class="text-input" for="publisher">Publisher<span class="required">*</span></label>
          <input class="input-form" id="publisher" type="text" name="publisher" value="" placeholder="Input Publisher..." required>
        </div>

        <div class="div-input">
        <label class="text-input" for="isbn">ISBN<span class="required">*</span></label>
          <input class="input-form" id="isbn" type="number" name="isbn" value="" placeholder="Input ISBN... (number)" required>
        </div>

        <div class="div-input">
        <label class="text-input" for="publication-year">Publication Year<span class="required">*</span></label>
          <input class="input-form" id="publication-year" type="date" name="publication-year" value="" min="1000" max="9999" placeholder="Input Publication Year..." required>
        </div>

        <div class="div-input">
        <label class="text-input" for="place-of-publication">Place of Publication<span class="required">*</span></label>
          <input class="input-form" id="place-of-publication" type="text" name="place-of-publication" value="" placeholder="Input Place of Publication..." required>
        </div>

        <div class="div-input">
        <label class="text-input" for="editor">Editor</label>
          <input class="input-form" id="editor" type="text" name="editor" value="" placeholder="Input Editor Name...">
        </div>

        <div class="div-input">
        <label class="text-input" for="ilustrator">Ilustrator</label>
          <input class="input-form" id="ilustrator" type="text" name="ilustrator" value="" placeholder="Input Ilustrator Name...">
        </div>

        <div class="div-input-isRead">
        <label class="text-input" for="isRead">Is Read?</label>
          <input class="input-form" id="isRead" type="checkbox" name="isRead" value="" placeholder="Input">
        </div>

        <button class="submit-button">Submit</button>
      </form>
    </section>

    <!-- ? Bagian Buat Nyari Buku -->
    <section id="search-section">
      <h2><label for="search-title">Search Title</label></h2>
        <form id="form-search-section" action="">
          <div id="div-search">
            <input type="text" name="search-title" id="search-title" placeholder="Search title...">
            <button id="search-button">Search</button>
          </div>
        </form>
    </section>

    <!-- ? Kumpulan Buku yang udah di baca -->
    <section id="bookshelf-read-section">
      <h2>Read List Books</h2>
      <div id="read-list">
      </div>
    </section>

    <!-- ? Kumpulan Buku yang belum di baca -->
    <section id="bookshelf-unread-section">
      <h2>Unread List Books</h2>
      <div id="unread-list"></div>
    </section>
    
  </main>
    
  <footer>
    <p>&copy; 2025 Baji Bookshelf. All rights reserved.</p>
  </footer>

  <!-- ! Javascript File -->
  <script type="module" src="index.js" defer></script>

</body>
</html>
